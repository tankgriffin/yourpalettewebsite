<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Test</title>
    <!-- Bootstrap 4.6 CSS -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/4.6.2/css/bootstrap.min.css">
    <!-- Font Awesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <!-- Custom CSS - Base and Components -->
    <link rel="stylesheet" href="static/css/base.css">
    <link rel="stylesheet" href="static/css/components/navigation.css">
    <link rel="stylesheet" href="static/css/components/buttons.css">
    <link rel="stylesheet" href="static/css/components/cards.css">
    <link rel="stylesheet" href="static/css/components/forms.css">
    
    <!-- Page-specific CSS -->
    <link rel="stylesheet" href="static/css/pages/home.css">
</head>
<body>
    <!-- Test Product Card -->
    <div class="container py-5">
        <div class="row">
            <div class="col-lg-3 col-md-6 mb-4">
                <div class="card product-card">
                    <div class="product-image" style="background-image: url('static/img/makeup-palette.jpg');">
                        <i class="fas fa-palette"></i>
                    </div>
                    <div class="card-body">
                        <h5 class="card-title">Professional Makeup Mixing Palette</h5>
                        <p class="card-text">Professional-grade stainless steel mixing palette perfect for creating custom makeup shades.</p>
                        <div class="product-actions">
                            <div class="price-qty-container">
                                <span class="price-tag">$18.99</span>
                                <div class="quantity-controls">
                                    <button class="qty-btn">-</button>
                                    <span class="qty-display">1</span>
                                    <button class="qty-btn">+</button>
                                </div>
                            </div>
                            <button class="btn btn-primary-custom w-100">Add to Basket</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
